version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount IRIS codebase read-only so the backend can import it
      - /Users/temp/Desktop/projects/world_models/iris:/iris:ro
    environment:
      IRIS_ROOT: /iris
      IRIS_SRC: /iris/src
      CHECKPOINT_DIR: /iris/checkpoints
      DEFAULT_DEVICE: cpu
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
